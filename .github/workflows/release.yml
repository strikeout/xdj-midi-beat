name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTY_LINK_VERSION: "0.2.3"

jobs:
  # ── Run tests before releasing ───────────────────────────────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libasound2-dev pkg-config

      - name: Restore vendored rusty_link
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor/rusty_link
          key: rusty-link-${{ env.RUSTY_LINK_VERSION }}-${{ runner.os }}

      - name: Download vendored rusty_link
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 5 \
            -H "User-Agent: xdj-clock-ci/1.0" \
            "https://static.crates.io/crates/rusty_link/rusty_link-$RUSTY_LINK_VERSION.crate" \
            -o "$RUNNER_TEMP/rusty_link.tar.gz"
          tar xzf "$RUNNER_TEMP/rusty_link.tar.gz" -C vendor
          mv "vendor/rusty_link-$RUSTY_LINK_VERSION" vendor/rusty_link

      - name: Verify vendored rusty_link
        run: |
          if [ ! -f vendor/rusty_link/Cargo.toml ]; then
            echo "::error::vendor/rusty_link/Cargo.toml not found — download or cache is broken"
            ls -la vendor/ || true
            exit 1
          fi
          echo "vendor/rusty_link OK"

      - name: Patch vendored build.rs for static linking
        run: |
          cp .github/vendor-patches/build.rs vendor/rusty_link/build.rs
          cp .github/vendor-patches/link_bindings.rs vendor/rusty_link/link_bindings.rs

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  # ── Build release binaries ───────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86-64 (MSVC)
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: xdj-clock-windows-x86_64
            binary: xdj-clock.exe
            archive_cmd: zip

          # Linux x86-64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: xdj-clock-linux-x86_64
            binary: xdj-clock
            archive_cmd: tar

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: xdj-clock-macos-aarch64
            binary: xdj-clock
            archive_cmd: tar

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libasound2-dev pkg-config

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true

      # ── Vendor setup ─────────────────────────────────────────────────────────

      - name: Restore vendored rusty_link
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor/rusty_link
          key: rusty-link-${{ env.RUSTY_LINK_VERSION }}-${{ runner.os }}

      - name: Download vendored rusty_link (Unix)
        if: steps.vendor-cache.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          mkdir -p vendor
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 5 \
            -H "User-Agent: xdj-clock-ci/1.0" \
            "https://static.crates.io/crates/rusty_link/rusty_link-$RUSTY_LINK_VERSION.crate" \
            -o "$RUNNER_TEMP/rusty_link.tar.gz"
          tar xzf "$RUNNER_TEMP/rusty_link.tar.gz" -C vendor
          mv "vendor/rusty_link-$RUSTY_LINK_VERSION" vendor/rusty_link

      - name: Download vendored rusty_link (Windows)
        if: steps.vendor-cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force vendor | Out-Null
          $url = "https://static.crates.io/crates/rusty_link/rusty_link-$env:RUSTY_LINK_VERSION.crate"
          $tmp = "$env:RUNNER_TEMP\rusty_link.tar.gz"
          curl.exe --fail --show-error --location --retry 3 --retry-delay 5 -H "User-Agent: xdj-clock-ci/1.0" "$url" -o "$tmp"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "curl.exe failed with exit code $LASTEXITCODE"
            exit 1
          }
          if (!(Test-Path "$tmp") -or (Get-Item "$tmp").Length -lt 1024) {
            Write-Error "Downloaded file is missing or suspiciously small"
            exit 1
          }
          tar.exe xzf "$tmp" -C vendor
          Rename-Item "vendor\rusty_link-$env:RUSTY_LINK_VERSION" "rusty_link"

      - name: Verify vendored rusty_link (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f vendor/rusty_link/Cargo.toml ]; then
            echo "::error::vendor/rusty_link/Cargo.toml not found — download or cache is broken"
            ls -la vendor/ || true
            exit 1
          fi
          echo "vendor/rusty_link OK"

      - name: Verify vendored rusty_link (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "vendor\rusty_link\Cargo.toml")) {
            Write-Error "vendor\rusty_link\Cargo.toml not found — download or cache is broken"
            Get-ChildItem vendor -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "vendor/rusty_link OK"

      - name: Patch vendored build.rs for static linking
        if: runner.os != 'Windows'
        run: |
          cp .github/vendor-patches/build.rs vendor/rusty_link/build.rs
          cp .github/vendor-patches/link_bindings.rs vendor/rusty_link/link_bindings.rs

      - name: Patch vendored build.rs for static linking (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item ".github\vendor-patches\build.rs" "vendor\rusty_link\build.rs"
          Copy-Item ".github\vendor-patches\link_bindings.rs" "vendor\rusty_link\link_bindings.rs"

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "${{ matrix.artifact }}"
          New-Item -ItemType Directory $dir
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" $dir\
          Copy-Item config.toml $dir\
          Copy-Item README.md $dir\
          Compress-Archive -Path $dir\* -DestinationPath "$dir.zip"
          echo "ASSET=$dir.zip" >> $env:GITHUB_ENV

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          version="${{ github.ref_name }}"
          dir="${{ matrix.artifact }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$dir/"
          cp config.toml "$dir/"
          cp README.md "$dir/"
          tar -czf "$dir.tar.gz" "$dir"
          echo "ASSET=$dir.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          # Collect all archive files
          files=$(find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | tr '\n' ' ')
          gh release create "$tag" \
            --title "xdj-clock $tag" \
            --generate-notes \
            $files
